<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>POS System</title>

<link rel="stylesheet"
href="pos.css">

</head>

<body>

<div class="container">

<h1>
Point of Sales System
</h1>

<div class="products">

<button onclick="addOrder('Burger',120)">
Burger - ₱120
</button>

<button onclick="addOrder('Fries',80)">
Fries - ₱80
</button>

<button onclick="addOrder('Pizza',250)">
Pizza - ₱250
</button>

<button onclick="addOrder('Milk Tea',90)">
Milk Tea - ₱90
</button>

<button onclick="addOrder('Hotdog',70)">
Hotdog - ₱70
</button>

</div>

<div class="order-section">

<h2>Customer Orders</h2>

<table>

<thead>

<tr>

<th>Product</th>
<th>Price</th>

</tr>

</thead>

<tbody id="orderList">

</tbody>

</table>

<h2 id="total">
Total: ₱0
</h2>

</div>

</div>

<script src="pos.js"></script>

</body>
</html>
